<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="calculadora">

<input type="text" class="pantalla" id="pantalla">

<div class="botones">

<button class="limpiar" onclick="limpiar()">C</button>
<button class="operador" id="division" onclick="agregar('/')">/</button>
<button class="operador" id="multiplicacion" onclick="agregar('*')">*</button>
<button class="operador" id= "resta" onclick="agregar('-')">-</button>
<button class="borrar" onclick="borrar()">DEL</button>

<button class="numero" id= "siete" onclick="agregar('7')">7</button>
<button class="numero" id= "ocho" onclick="agregar('8')">8</button>
<button class="numero" id= "nueve" onclick="agregar('9')">9</button>
<button class="operador" id= "suma"  onclick="agregar('+')">+</button>

<button class="numero" id= "cuatro" onclick="agregar('4')">4</button>
<button class="numero" id= "cinco"  onclick="agregar('5')">5</button>
<button class="numero" id= "seis" onclick="agregar('6')">6</button>

<button class="numero" id= "uno" onclick="agregar('1')">1</button>
<button class="numero" id= "dos" onclick="agregar('2')">2</button>
<button class="numero" id= "tres" onclick="agregar('3')">3</button>

<button class="numero" id= "cero" onclick="agregar('0')">0</button>
<button class="numero" id= "decimal" onclick="agregar('.')">.</button>

<button class="igual" onclick="calcular()">=</button>

</div>
</div>
<script src="script.js"></script>


</body>
</html>
